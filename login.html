<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Stock Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(rgba(0,40,80,.45),rgba(0,40,80,.45)),
url("assets/login-bg.jpg");

background-size:cover;
background-position:center;

}

.login{

width:380px;
background:white;

padding:40px;

border-radius:20px;

box-shadow:0 20px 40px rgba(0,0,0,.2);

}

.logo{

text-align:center;

margin-bottom:20px;

}

.logo img{

width:90px;

}

h2{

text-align:center;

margin-bottom:25px;

color:#003366;

}

input{

width:100%;

padding:14px;

margin-bottom:15px;

border-radius:10px;

border:1px solid #ddd;

}

button{

width:100%;

padding:14px;

border:none;

background:#0066cc;

color:white;

font-size:16px;

border-radius:10px;

cursor:pointer;

}

button:hover{

background:#004b96;

}

.footer{

text-align:center;

margin-top:20px;

font-size:13px;

color:#666;

}

</style>

</head>

<body>

<div class="login">

<div class="logo">

<img src="assets/logo.png">

</div>

<h2>E-Stock Login</h2>

<input placeholder="Username">

<input type="password" placeholder="Password">

<button onclick="window.location='dashboard.html'">

LOGIN

</button>

<div class="footer">

Secretariat of Kondey Council

</div>

</div>

</body>

</html>
