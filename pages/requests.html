<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Requests</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="app-shell">

  <aside class="sidebar">
    <div class="brand">
      <img src="../assets/logo/logo.png" alt="Logo">
      <h2>E-Stock</h2>
      <p>Kondey Council</p>
    </div>

    <nav class="menu">
    <a href="../dashboard.html" data-role="Admin,Secretary General,Store Keeper,Requester,Viewer">📊 Dashboard</a>
    <a href="items.html" data-role="Admin,Store Keeper">📦 Items</a>
    <a href="stock-in.html" data-role="Admin,Store Keeper">📥 Stock In</a>
    <a href="requests.html" data-role="Admin,Secretary General,Store Keeper,Requester">📝 Requests</a>
    <a href="users.html" data-role="Admin">👥 Users</a>
    <a href="../login.html" onclick="logout()">🚪 Logout</a>
    </nav>
  </aside>

  <main class="main-content">

    <header class="topbar">
      <div>
        <h1>Stock Requests</h1>
        <p>Request multiple items from store</p>
      </div>

      <div>
        <button class="btn" type="button" onclick="document.getElementById('requestModal').style.display='block'">+ New Request</button>

        <button class="btn" type="button" style="background:#dc2626;margin-left:10px;"
          onclick="localStorage.removeItem('estock_requests');location.reload();">
          Clear Requests
        </button>
      </div>
    </header>

    <section class="panel" style="margin-top:22px;">
      <h2>Requests</h2>

      <table id="requestsTable">
        <thead>
          <tr>
            <th>Request No</th>
            <th>Date</th>
            <th>Department</th>
            <th>Items</th>
            <th>Attached Form</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

  </main>

</div>

<div id="requestModal"
     style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;
     background:rgba(0,0,0,0.65);z-index:9999999;overflow:auto;">

  <div style="background:#fff;width:700px;max-width:95%;
              margin:50px auto;padding:20px;border-radius:12px;">

    <h2>New Request</h2>

    <input id="requestNo" type="text" placeholder="Request Number"
           style="width:100%;padding:10px;margin-bottom:10px;">

    <input id="requestDate" type="date"
           style="width:100%;padding:10px;margin-bottom:10px;">

    <select id="requestDepartment" style="width:100%;padding:10px;margin-bottom:10px;">
      <option value="">Select Department</option>
      <option>Administration</option>
      <option>Council Office</option>
      <option>WDC</option>
      <option>Pre-School</option>
      <option>Mosque</option>
      <option>Waste Management</option>
      <option>Public Area</option>
      <option>Other</option>
</select>

    <h3>Requested Items</h3>

<div style="display:flex;gap:8px;margin-bottom:10px;">

<input id="requestItem"
       type="text"
       list="stockItemsList"
       placeholder="Type item name..."
       style="flex:2;padding:10px;">

<datalist id="stockItemsList"></datalist>
  <input id="requestQty"
         type="number"
         placeholder="Qty"
         style="flex:1;padding:10px;">

  <button class="btn" type="button" onclick="addRequestItem()">Add</button>

</div>

    <table id="requestItemsTable" style="margin-bottom:10px;">
      <thead>
        <tr>
          <th>#</th>
          <th>Item Code</th>
          <th>Item Name</th>
          <th>Qty</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <button class="btn" onclick="saveRequest()">Save Request</button>
    <button class="btn" type="button" style="background:#999;margin-left:10px;" onclick="document.getElementById('requestModal').style.display='none'">Close</button>

  </div>

</div>

<script src="../js/app.js"></script>
<script src="../js/requests.js"></script>
</body>
</html>
