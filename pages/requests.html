<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Requests</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="app-shell">

  <aside class="sidebar">
    <div class="brand">
      <img src="../assets/logo/logo.png" alt="Logo">
      <h2>E-Stock</h2>
      <p>Kondey Council</p>
    </div>

    <nav class="menu">
      <a href="../dashboard.html">📊 Dashboard</a>
      <a href="items.html">📦 Items</a>
      <a href="stock-in.html">📥 Stock In</a>
      <a href="stock-out.html">📤 Stock Out</a>
      <a href="requests.html" class="active">📝 Requests</a>
      <a href="reports.html">📄 Reports</a>
      <a href="users.html">👥 Users</a>
      <a href="../login.html">🚪 Logout</a>
    </nav>
  </aside>

  <main class="main-content">

    <header class="topbar">
      <div>
        <h1>Stock Requests</h1>
        <p>Request multiple items from store</p>
      </div>

      <button class="btn" onclick="openRequestModal()">+ New Request</button>
    </header>

    <section class="panel">
      <h2>Requests</h2>

      <table id="requestsTable">
        <thead>
          <tr>
            <th>Request No</th>
            <th>Date</th>
            <th>Department</th>
            <th>Items</th>
            <th>Attached Form</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

  </main>

</div>

<div id="requestModal"
     style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;
     background:rgba(0,0,0,0.5);z-index:9999;overflow:auto;">

  <div style="background:#fff;width:700px;max-width:95%;
              margin:50px auto;padding:20px;border-radius:12px;">

    <h2>New Request</h2>

    <input id="requestNo" type="text" placeholder="Request Number"
           style="width:100%;padding:10px;margin-bottom:10px;">

    <input id="requestDate" type="date"
           style="width:100%;padding:10px;margin-bottom:10px;">

    <input id="requestDepartment" type="text" placeholder="Department"
           style="width:100%;padding:10px;margin-bottom:10px;">

    <h3>Requested Items</h3>

    <div style="display:flex;gap:8px;margin-bottom:10px;">
      <input id="requestItem" type="text" placeholder="Item"
             style="flex:2;padding:10px;">

      <input id="requestQty" type="number" placeholder="Qty"
             style="flex:1;padding:10px;">

      <button class="btn" type="button" onclick="addRequestItem()">Add</button>
    </div>

    <table id="requestItemsTable" style="margin-bottom:10px;">
      <thead>
        <tr>
          <th>Item</th>
          <th>Qty</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <label>Attach Request Form</label>
    <input id="requestFile"
           type="file"
           accept=".pdf,.jpg,.jpeg,.png"
           style="width:100%;padding:10px;margin-bottom:10px;">

    <button class="btn" onclick="saveRequest()">Save Request</button>
    <button class="btn" style="background:#999;margin-left:10px;" onclick="closeRequestModal()">Close</button>

  </div>

</div>

<script src="../js/app.js"></script>
<script src="../js/requests.js"></script>
</body>
</html>
