
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Stock | Users</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="app-shell">

  <aside class="sidebar">
    <div class="brand">
      <img src="../assets/logo/logo.png">
      <h2>E-Stock</h2>
      <p>Kondey Council</p>
    </div>

    <nav class="menu">
      <a href="../dashboard.html" data-role="Admin,Secretary General,Store Keeper,Requester,Viewer">📊 Dashboard</a>
      <a href="items.html" data-role="Admin,Store Keeper">📦 Items</a>
      <a href="categories.html" data-role="Admin,Store Keeper">📂 Categories</a>
      <a href="suppliers.html" data-role="Admin,Store Keeper">🏢 Suppliers</a>
      <a href="stock-in.html" data-role="Admin,Store Keeper">📥 Stock In</a>
      <a href="stock-out.html" data-role="Admin,Store Keeper">📤 Stock Out</a>
      <a href="requests.html" data-role="Admin,Secretary General,Store Keeper,Requester">📝 Requests</a>
      <a href="adjustments.html" data-role="Admin,Store Keeper">⚙ Stock Adjustment</a>
      <a href="reports.html" data-role="Admin,Secretary General,Store Keeper,Viewer">📄 Reports</a>
      <a href="users.html" class="active" data-role="Admin">👥 Users</a>
      <a href="../login.html" onclick="logout()">🚪 Logout</a>
    </nav>
  </aside>

  <main class="main-content">

    <header class="topbar">
      <div>
        <h1>User Management</h1>
        <p>Manage system users and permissions</p>
      </div>

      <button class="btn" onclick="openUserModal()">+ Add User</button>
    </header>

    <section class="panel" style="margin-top:20px;">
      <table id="usersTable">
        <thead>
          <tr>
            <th>Username</th>
            <th>Full Name</th>
            <th>Role</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

  </main>
</div>

<div id="userModal"
     style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;
     background:rgba(0,0,0,.5);z-index:9999;">

  <div style="background:#fff;width:500px;max-width:95%;
              margin:60px auto;padding:25px;border-radius:15px;">

    <h2>Add User</h2>

    <input id="fullName" placeholder="Full Name" style="width:100%;padding:12px;margin-bottom:10px;">
    <input id="username" placeholder="Username" style="width:100%;padding:12px;margin-bottom:10px;">
    <input id="password" type="password" placeholder="Password" style="width:100%;padding:12px;margin-bottom:10px;">

    <select id="role" style="width:100%;padding:12px;margin-bottom:10px;">
      <option value="">Select Role</option>
      <option>Admin</option>
      <option>Secretary General</option>
      <option>Store Keeper</option>
      <option>Requester</option>
      <option>Viewer</option>
    </select>

    <select id="status" style="width:100%;padding:12px;margin-bottom:10px;">
      <option>Active</option>
      <option>Inactive</option>
    </select>

    <button class="btn" onclick="saveUser()">Save User</button>
    <button class="btn" style="background:#999;margin-left:10px;" onclick="closeUserModal()">Close</button>

  </div>
</div>

<script src="../js/app.js"></script>
<script src="../js/users.js"></script>
</body>
</html>
