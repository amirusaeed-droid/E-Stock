<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Stock | Stock Out</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="app-shell">
  <aside class="sidebar">
    <div class="brand">
      <img src="../assets/logo/logo.png">
      <h2>E-Stock</h2>
      <p>Kondey Council</p>
    </div>

    <nav class="menu">
      <a href="../dashboard.html">📊 Dashboard</a>
      <a href="items.html">📦 Items</a>
      <a href="categories.html">📂 Categories</a>
      <a href="suppliers.html">🏢 Suppliers</a>
      <a href="stock-in.html">📥 Stock In</a>
      <a class="active" href="stock-out.html">📤 Stock Out</a>
      <a href="requests.html">📝 Requests</a>
      <a href="reports.html">📄 Reports</a>
      <a href="users.html">👥 Users</a>
      <a href="../login.html">🚪 Logout</a>
    </nav>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <div>
        <h1>Stock Out</h1>
        <p>Issue stock and deduct item balance</p>
      </div>
      <button class="btn" onclick="openStockOut()">+ New Stock Out</button>
    </header>

    <section class="panel" style="margin-top:22px;">
      <table id="stockOutTable">
        <thead>
          <tr>
            <th>Issue No</th>
            <th>Date</th>
            <th>Issued To</th>
            <th>Item</th>
            <th>Qty</th>
            <th>Purpose</th>
            <th>Remarks</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </main>
</div>

<div id="stockOutModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.5); z-index:9999;">
  <div style="background:white; width:650px; max-width:95%; margin:45px auto; padding:25px; border-radius:18px;">
    <h2>New Stock Out</h2><br>

    <input id="issueNo" placeholder="Issue Number" style="width:100%;padding:12px;margin-bottom:10px;">
    <input id="stockOutDate" type="date" style="width:100%;padding:12px;margin-bottom:10px;">

    <select id="stockOutDepartment" style="width:100%;padding:12px;margin-bottom:10px;">
      <option>Administration</option>
      <option>Council Office</option>
      <option>WDC</option>
      <option>Pre-School</option>
      <option>Mosque</option>
      <option>Waste Management</option>
      <option>Other</option>
    </select>

    <select id="stockOutItem" style="width:100%;padding:12px;margin-bottom:10px;"></select>

    <input id="stockOutQty" type="number" placeholder="Quantity" style="width:100%;padding:12px;margin-bottom:10px;">
    <input id="stockOutPurpose" placeholder="Purpose" style="width:100%;padding:12px;margin-bottom:10px;">
    <textarea id="stockOutRemarks" placeholder="Remarks" style="width:100%;padding:12px;margin-bottom:10px;height:80px;"></textarea>

    <button class="btn" onclick="saveStockOut()">Save Stock Out</button>
    <button class="btn" style="background:#999;margin-left:10px;" onclick="closeStockOut()">Close</button>
  </div>
</div>

<script src="../js/app.js"></script>
</body>
</html>
